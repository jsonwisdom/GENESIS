name: replay-eas-base

on:
  pull_request:
    paths:
      - 'x-files-alien-files-26/scripts/verify-eas-onchain.sh'
      - '.github/workflows/replay-eas-base.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  replay:
    runs-on: ubuntu-latest
    env:
      BASE_RPC_URL: https://mainnet.base.org
      EAS_CONTRACT: 0x4200000000000000000000000000000000000021
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Execute Base EAS replay
        working-directory: x-files-alien-files-26
        run: |
          chmod +x scripts/verify-eas-onchain.sh
          scripts/verify-eas-onchain.sh

      - name: Upload replay receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eas-onchain-replay-${{ github.sha }}
          path: x-files-alien-files-26/receipts/eas-onchain-replay-0001.log
          if-no-files-found: error
